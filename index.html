<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tecnoingenieria J&D SAS</title>
<style>
body{margin:0;font-family:Arial;background:#f4f7fb;color:#111}
header{background:linear-gradient(90deg,#0057ff,#00bcd4);color:#fff;padding:60px 20px;text-align:center}
section{max-width:1100px;margin:auto;padding:40px 20px}
.card{background:#fff;padding:25px;border-radius:16px;box-shadow:0 8px 20px rgba(0,0,0,.08);margin:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.btn{display:inline-block;background:#fff;color:#0057ff;padding:14px 22px;border-radius:12px;text-decoration:none;font-weight:bold}
footer{background:#111;color:#fff;text-align:center;padding:25px}
</style>
</head>
<body>

<header>
<h1>Tecnoingenieria J&D SAS</h1>
<p>Soluciones en licitaciones, ingeniería, suministros y tecnología</p>
<a class="btn" href="#">Solicitar Cotización</a>
</header>

<section>
<h2>Servicios</h2>
<div class="grid">
<div class="card">Licitaciones</div>
<div class="card">Suministros</div>
<div class="card">Ingeniería</div>
</div>
</section>

<footer>
© 2026 Tecnoingenieria J&D SAS
</footer>

</body>
</html>
